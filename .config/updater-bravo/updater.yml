tasks:
  - name: tuclaw
    command: |
      echo "update tuclaw"
      ssh -o StrictHostKeyChecking=no tuclaw@host.docker.internal 'bash -s' <<'DEPLOY'
      set -e
      cd /home/tuclaw/tuclaw
      set -a; . ./.env; set +a

      echo "pulling latest source..."
      PREV_HEAD=$(git rev-parse HEAD)
      git pull --ff-only

      echo "pulling agent image..."
      docker tag "${DOCKER_REGISTRY}/${DOCKER_USERNAME}/tuclaw-agent:latest" tuclaw-agent:prev 2>/dev/null || true
      docker pull "${DOCKER_REGISTRY}/${DOCKER_USERNAME}/tuclaw-agent:latest"
      docker tag "${DOCKER_REGISTRY}/${DOCKER_USERNAME}/tuclaw-agent:latest" tuclaw-agent:latest

      echo "pulling daemon image + recreating container..."
      docker tag "$TUCLAW_IMAGE" tuclaw-daemon:prev 2>/dev/null || true
      docker compose pull
      docker compose up -d

      echo "health check..."
      sleep 10
      if curl -sf http://localhost:9090/health >/dev/null 2>&1; then
        echo "deploy successful"
      else
        echo "health check failed, rolling back..."
        git reset --hard "$PREV_HEAD" 2>/dev/null || true
        docker image inspect tuclaw-daemon:prev >/dev/null 2>&1 && docker tag tuclaw-daemon:prev "$TUCLAW_IMAGE" || true
        docker image inspect tuclaw-agent:prev >/dev/null 2>&1 && docker tag tuclaw-agent:prev tuclaw-agent:latest || true
        docker compose up -d
        echo "rollback complete"
        exit 1
      fi
      DEPLOY

  - name: llm-gateway
    command: |
      echo "update llm-gateway"
      ssh -o StrictHostKeyChecking=no tuclaw@host.docker.internal 'bash -s' <<'DEPLOY'
      set -e
      cd /home/tuclaw/llm-gateway
      set -a; . ./.env; set +a

      echo "pulling latest source..."
      PREV_HEAD=$(git rev-parse HEAD)
      git pull --ff-only

      echo "pulling image + recreating container..."
      docker tag "$LLM_GATEWAY_IMAGE" llm-gateway:prev 2>/dev/null || true
      docker compose pull
      docker compose up -d

      echo "health check (docker healthcheck, no http endpoint)..."
      STATUS=unknown
      for i in $(seq 1 18); do
        sleep 5
        STATUS=$(docker inspect --format '{{.State.Health.Status}}' llm-gateway-llm-gateway-1 2>/dev/null || echo missing)
        [ "$STATUS" = "healthy" ] && break
      done
      if [ "$STATUS" = "healthy" ]; then
        echo "deploy successful"
      else
        echo "health status: $STATUS, rolling back..."
        git reset --hard "$PREV_HEAD" 2>/dev/null || true
        docker image inspect llm-gateway:prev >/dev/null 2>&1 && docker tag llm-gateway:prev "$LLM_GATEWAY_IMAGE" || true
        docker compose up -d
        echo "rollback complete"
        exit 1
      fi
      DEPLOY

  - name: tuclaw-voice
    command: |
      echo "update tuclaw-voice"
      ssh -o StrictHostKeyChecking=no tuclaw@host.docker.internal 'bash -s' <<'DEPLOY'
      set -e
      cd /home/tuclaw/tuclaw-voice
      eval "$(mise env -s bash)"

      echo "pulling latest source..."
      git pull --ff-only

      echo "syncing dependencies..."
      uv sync

      echo "restarting service..."
      sudo systemctl restart tuclaw-voice

      echo "health check..."
      sleep 3
      if curl -sf http://localhost:8000/health >/dev/null 2>&1; then
        echo "deploy successful"
      else
        echo "health check failed"
        sudo journalctl -u tuclaw-voice --no-pager -n 20
        exit 1
      fi
      DEPLOY

  - name: ralphex-farm
    command: |
      echo "update ralphex-farm"
      ssh -o StrictHostKeyChecking=no tuclaw@host.docker.internal 'bash -s' <<'DEPLOY'
      set -e
      cd /home/tuclaw/ralphex-farm

      echo "pulling latest source..."
      PREV_HEAD=$(git rev-parse HEAD)
      git pull --ff-only

      echo "pulling latest image..."
      docker tag git.pkarpovich.space/pkarpovich/ralphex-farm:latest ralphex-farm:prev 2>/dev/null || true
      docker compose pull farm
      docker compose up -d farm

      echo "health check..."
      sleep 10
      if curl -sf http://localhost:7077/health >/dev/null 2>&1; then
        echo "deploy successful"
      else
        echo "health check failed, rolling back..."
        git reset --hard "$PREV_HEAD" 2>/dev/null || true
        if docker image inspect ralphex-farm:prev >/dev/null 2>&1; then
          docker tag ralphex-farm:prev git.pkarpovich.space/pkarpovich/ralphex-farm:latest
        fi
        docker compose up -d farm
        exit 1
      fi
      DEPLOY
