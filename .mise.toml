[tasks.deploy-alpha]
description = "Deploy the alpha cluster (first Pi) - full compose stack"
run = "spot --task=deploy-alpha --target=alpha -v -i ./inventory.yml --ssh-agent"

[tasks.deploy-bravo]
description = "Deploy the bravo cluster (second Pi) - traefik + updater only"
run = "spot --task=deploy-bravo --target=bravo -v -i ./inventory.yml --ssh-agent"
